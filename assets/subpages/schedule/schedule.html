/* 悬浮圆形玻璃按钮（仿 grades back-top） */
.schedule-action-fab {
    position: fixed;
    right: 18px;
    bottom: calc(72px + env(safe-area-inset-bottom));
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    color: var(--weui-FG-0);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, background-color 0.12s ease, opacity 0.12s ease;
}
.schedule-action-fab:active {
    transform: scale(0.92);
    background-color: var(--weui-FG-5);

}

/* 弹窗 wrap：挂载到 popup 预留层，flex 居中 */
.schedule-dialog-wrap {

    transition: opacity 0.2s ease, visibility 0.2s ease;
    pointer-events: none;
}
.schedule-dialog-wrap.schedule-dialog-wrap--visible {
    opacity: 1; visibility: visible;
}

/* 面板：居中，pointer-events: auto */

}

}

}

    border: none;
}

    .schedule-dialog-tab[data-active="true"]:hover {
        color: var(--weui-BRAND);
        background: transparent;
    }
}
.schedule-dialog-indicator {

    left: 10%;
    right: 10%;

    height: 3px;
    border-radius: 999px;
    background: var(--weui-BRAND);
    opacity: 0;
    transform: scaleX(.6);

}

}
.schedule-dialog-close {

}
